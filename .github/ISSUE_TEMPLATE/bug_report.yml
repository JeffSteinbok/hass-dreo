name: Bug Report
description: Create a report to help us improve
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## ⚠️ Logs and diagnostics are essential

        I only personally own 2 Dreo devices. This project supports many more than that, and the **only** way I can debug issues with devices I don't own is if you provide logs and diagnostics. Bug reports without this information are very difficult to act on and may be closed.

        Please follow the [debugging instructions](https://github.com/JeffSteinbok/hass-dreo?tab=readme-ov-file#debugging) to collect:
        1. **Diagnostics JSON** — download from Settings → Devices → Dreo → ⋮ → Download diagnostics
        2. **Debug logs** — enable debug logging, reproduce the issue, then download full logs

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Integration Version
      description: >
        The version of the Dreo integration you are using.
        You can find this in Settings → Devices & Services → Dreo.
      placeholder: e.g. 2025.1.0
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: >
        Attach your diagnostics JSON file here. This is **required** and is the most important
        piece of information for debugging. Without it, we cannot see your device configuration.
        See [how to download diagnostics](https://github.com/JeffSteinbok/hass-dreo?tab=readme-ov-file#debugging)
        for instructions.
    validations:
      required: true

  - type: checkboxes
    id: diagnostics-confirm
    attributes:
      label: Diagnostics attached
      options:
        - label: I have attached [diagnostics](https://github.com/JeffSteinbok/hass-dreo?tab=readme-ov-file#debugging).
          required: true

  - type: textarea
    id: logs
    attributes:
      label: Debug Logs
      description: >
        Enable debug logging, reproduce the issue, then paste relevant log output here.
        This is **required** — without logs we cannot diagnose most issues.
        See [debugging instructions](https://github.com/JeffSteinbok/hass-dreo?tab=readme-ov-file#debugging).
      render: text
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
    validations:
      required: false
