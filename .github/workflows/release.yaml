name: Release Automation

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/common-tests.yaml

  release:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}

    steps:
    - uses: actions/checkout@v7
      with:
        token: ${{ secrets.PAT_TOKEN }}
    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip build
        pip install "bump-my-version>=1.3,<2"

    - name: Configure Git
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

    - name: Bump version
      id: bump
      run: |
        BUMP_TYPE="${{ github.event.inputs.bump_type }}"

        CURRENT_VERSION=$(bump-my-version show current_version)
        echo "Current version: $CURRENT_VERSION"
        echo "Bumping part: $BUMP_TYPE"

        bump-my-version bump "$BUMP_TYPE"

        NEW_VERSION=$(bump-my-version show current_version)
        echo "New version: $NEW_VERSION"
        echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

    - name: Build Python package
      run: python -m build

    - name: Upload package artifacts
      uses: actions/upload-artifact@v7
      with:
        name: python-package
        path: dist/

    - name: Push version bump
      run: |
        git push origin HEAD:${{ github.ref_name }}
        git push origin --tags

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: v${{ steps.bump.outputs.version }}
        name: Release v${{ steps.bump.outputs.version }}
        draft: true
        prerelease: false
        generate_release_notes: true
        files: dist/*

  # PyPI publishing is handled by publish.yaml, triggered when the draft release is published
