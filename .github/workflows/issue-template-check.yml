name: Issue Triage

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created, edited]

permissions:
  issues: write

jobs:
  check-template:
    if: github.event_name == 'issues' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Enforce issue template
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.issue.user.login;

            // Skip collaborators
            try {
              const { data: permLevel } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: author,
              });
              if (['admin', 'write'].includes(permLevel.permission)) {
                core.info(`Collaborator ${author}. Skipping template check.`);
                return;
              }
            } catch (e) {
              core.info(`Could not check permissions: ${e.message}. Proceeding.`);
            }

            const body = context.payload.issue.body || '';

            // Each entry is the set of required headings that uniquely identify a template.
            // All headings in a set must be present for the template to be considered used.
            const templateSignatures = [
              // bug_report.yml
              ['### Describe the bug'],
              // device-feature-request.yml
              ['### Problem description', '### Describe the solution you\'d like'],
              // new-device-request.yml
              ['### Product Page Link'],
            ];

            const templateDetected = templateSignatures.some(sig =>
              sig.every(marker => body.includes(marker))
            );

            if (templateDetected) {
              core.info('Template detected.');
              return;
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['missing-template'],
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '👋 Thanks for opening an issue!',
                '',
                'It looks like this issue was not filed using one of our [issue templates](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/issues/new/choose).',
                'Templates help ensure we have the information needed to help you.',
                '',
                'Please **close this issue** and open a new one using the appropriate template:',
                '- 🐛 **[Bug Report](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/issues/new?template=bug_report.yml)**',
                '- 💡 **[Device Feature Request](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/issues/new?template=device-feature-request.yml)**',
                '- 📱 **[New Device Request](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/issues/new?template=new-device-request.yml)**',
                '',
                '_This is an automated message._',
              ].join('\n'),
            });

  check-logs:
    if: github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - name: Validate issue content
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';
            const author = issue.user.login;
            const issueNumber = issue.number;
            const existingLabels = issue.labels.map((label) => typeof label === 'string' ? label : label.name);
            const hasNeedsInfo = existingLabels.includes('needs-info');
            const hasTriaged = existingLabels.includes('triaged');

            // Check if this is a bug report or feature request that needs validation
            const isBugReport = body.includes('### Describe the bug');
            const isFeatureRequest = body.includes('### Problem description');
            
            if (!isBugReport && !isFeatureRequest) {
              core.info('Not a bug report or feature request. Skipping.');
              return;
            }

            // Skip collaborators
            try {
              const { data: permLevel } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: author,
              });
              if (['admin', 'write'].includes(permLevel.permission)) {
                core.info(`Collaborator ${author}. Skipping.`);
                return;
              }
            } catch (e) {
              core.info(`Could not check permissions: ${e.message}. Proceeding.`);
            }

            function getSectionContent(heading) {
              const pattern = new RegExp(
                `###\\s*${heading.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\s*\\n([\\s\\S]*?)(?=\\n###\\s|$)`
              );
              const match = body.match(pattern);
              return match ? match[1].trim() : '';
            }

            function normalizeContent(content) {
              return (content || '')
                .replace(/<!--[\s\S]*?-->/g, '')
                .replace(/```[\w-]*\n?/g, '')
                .replace(/```/g, '')
                .replace(/\s+/g, ' ')
                .trim()
                .toLowerCase();
            }

            const placeholders = new Set([
              'n/a',
              'na',
              'none',
              'no',
              'tbd',
              'todo',
              'will add later',
              '_no response_',
              'not available',
              'not applicable',
              'see diags',
              'see diagnostics',
              'see attached',
              'attached above',
              'same as above',
            ]);

            function isMissing(content) {
              const stripped = normalizeContent(content);
              if (!stripped) return true;
              if (stripped.length < 10) return true;
              return placeholders.has(stripped);
            }

            function stripOuterDelimiters(token) {
              const trimChars = new Set(['(', ')', '[', ']', '\'', '"', '`']);
              let start = 0;
              let end = token.length;
              while (start < end && trimChars.has(token[start])) start++;
              while (end > start && trimChars.has(token[end - 1])) end--;
              return token.slice(start, end);
            }

            function extractUrls(content) {
              const markdownUrls = Array.from(content.matchAll(/\[[^\]]*]\((https?:\/\/[^)]+)\)/gi), (match) => match[1]);
              const bareUrls = content
                .split(/\s+/)
                .filter((token) => token.toLowerCase().includes('http'))
                .map((token) => stripOuterDelimiters(token))
                .filter((token) => /^https?:\/\//i.test(token));
              return [...new Set([...markdownUrls, ...bareUrls])];
            }

            function isDiagnosticsValid(content) {
              if (isMissing(content)) return false;
              const urlMatches = extractUrls(content);
              const hasJsonAttachmentLink = urlMatches.some((url) => {
                try {
                  return new URL(url).pathname.toLowerCase().endsWith('.json');
                } catch (e) {
                  return false;
                }
              });
              if (hasJsonAttachmentLink) return true;
              // Try to extract and parse JSON from the content
              // Diagnostics may be wrapped in code blocks or have surrounding text
              const jsonMatch = content.match(/\{[\s\S]*"home_assistant"[\s\S]*\}/);
              if (!jsonMatch) return false;
              try {
                const parsed = JSON.parse(jsonMatch[0]);
                // Must have both home_assistant and integration_manifest keys
                return parsed.home_assistant && parsed.integration_manifest;
              } catch (e) {
                return false;
              }
            }

            function isLogsValid(content) {
              if (isMissing(content)) return false;

              const stripped = normalizeContent(content);
              const urlMatches = extractUrls(content);
              const hasLogAttachmentLink = urlMatches.some((url) => {
                try {
                  return /\.(log|txt|zip)$/i.test(new URL(url).pathname);
                } catch (e) {
                  return false;
                }
              });

              const fencedBlocks = Array.from(content.matchAll(/```(?:[\w-]+)?\n?([\s\S]*?)```/g), (match) => match[1]);
              const hasMeaningfulCodeBlock = fencedBlocks.some((block) => !isMissing(block) && normalizeContent(block).length >= 20);

              return hasLogAttachmentLink || hasMeaningfulCodeBlock || stripped.length >= 30;
            }

            const diagnostics = getSectionContent('Diagnostics');
            // Bug reports use "Debug Logs", feature requests use "Log Files"
            const logs = getSectionContent('Debug Logs') || getSectionContent('Log Files');

            let supplementalContent = '';
            if (context.payload.comment) {
              supplementalContent = context.payload.comment.user?.login === author ? (context.payload.comment.body || '') : '';
            } else if (context.payload.action === 'edited') {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                per_page: 100,
              });
              supplementalContent = comments
                .filter((comment) => comment.user?.login === author)
                .map((comment) => comment.body || '')
                .join('\n\n');
            }

            const diagnosticsPresent = isDiagnosticsValid(diagnostics) || isDiagnosticsValid(supplementalContent);
            const logsPresent = isLogsValid(logs) || isLogsValid(supplementalContent);

            const missingDiagnostics = !diagnosticsPresent;
            const missingLogs = !logsPresent;

            if (!missingDiagnostics && !missingLogs) {
              core.info('All required info present.');
              if (hasNeedsInfo) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    name: 'needs-info',
                  });
                } catch (e) { /* label may not exist */ }
              }

              if (!hasTriaged) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  labels: ['triaged'],
                });
              }

              if (context.payload.action === 'opened') {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: 'Thanks for the detailed report! 🔍 This issue has been triaged and is ready for investigation.',
                });
              } else if (hasNeedsInfo || !hasTriaged) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: hasNeedsInfo
                    ? 'Thanks for the update! 🔍 This issue has been re-triaged and is ready for investigation.'
                    : 'Thanks! 🔍 This issue has been triaged and is ready for investigation.',
                });
              }
              return;
            }

            if (hasTriaged) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: 'triaged',
                });
              } catch (e) { /* label may not exist */ }
            }

            const missing = [];
            if (missingDiagnostics) missing.push('**Diagnostics JSON** — download from Settings → Devices → Dreo → ⋮ → Download diagnostics');
            if (missingLogs) missing.push('**Debug logs** — enable debug logging, reproduce the issue, then download full logs');

            if (!hasNeedsInfo) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ['needs-info'],
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: [
                  `👋 Hey @${author}, thanks for filing this issue!`,
                  '',
                  'It looks like the following information is missing:',
                  ...missing.map(item => `- ${item}`),
                  '',
                  'Please update your issue with the missing information. See the [debugging instructions](https://github.com/JeffSteinbok/hass-dreo?tab=readme-ov-file#debugging) for help collecting this data.',
                  '',
                  '_This is an automated message._',
                ].join('\n'),
              });
            } else {
              core.info('Issue still missing required info.');
            }

  check-new-device-request:
    if: github.event_name == 'issues' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Triage new device request
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const author = context.payload.issue.user.login;
            const issueNumber = context.issue.number;

            // Only handle new device requests
            if (!body.includes('### Product Page Link')) {
              core.info('Not a new device request. Skipping.');
              return;
            }

            // Skip collaborators
            try {
              const { data: permLevel } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: author,
              });
              if (['admin', 'write'].includes(permLevel.permission)) {
                core.info(`Collaborator ${author}. Skipping.`);
                return;
              }
            } catch (e) {
              core.info(`Could not check permissions: ${e.message}. Proceeding.`);
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['triaged'],
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                `👋 Thanks for the new device request, @${author}!`,
                '',
                'This has been logged. Adding support for new devices requires diagnostics data and community testing — contributions via pull request are very welcome!',
                '',
                '_This is an automated message._',
              ].join('\n'),
            });
